<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Headset Manager Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1rem; max-width: 40rem; }
    h1 { margin-top: 0; }
    section { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.25rem; }
    input[type="text"] { width: 100%; padding: 0.5rem; box-sizing: border-box; }
    .buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.7; }
    #log { border: 1px solid #ccc; padding: 0.75rem; height: 12rem; overflow-y: auto; font-size: 0.875rem; font-family: monospace; white-space: pre-wrap; }
    .log-entry { margin-bottom: 0.25rem; }
    .log-entry.error { color: #c00; }
    .log-entry.event { color: #06c; }
  </style>
</head>
<body>
  <h1>Headset Manager Demo</h1>
  <section>
    <label for="deviceName">Device name (substring of product name)</label>
    <input id="deviceName" type="text" placeholder="e.g. Headset" />
    <div class="buttons">
      <button id="btnSelectDevice">Select WebHID device</button>
      <button id="btnConnect">Find and Connect</button>
      <button id="btnDisconnect" disabled>Disconnect</button>
    </div>
  </section>
  <section>
    <label>Actions</label>
    <div class="buttons">
      <button id="btnMute" disabled>Mute</button>
      <button id="btnUnmute" disabled>Unmute</button>
      <button id="btnAnswer" disabled>Answer</button>
      <button id="btnReject" disabled>Reject</button>
      <button id="btnCapabilities" disabled>Get Capabilities</button>
    </div>
  </section>
  <section>
    <label for="log">Log</label>
    <div id="log"></div>
  </section>
  <script type="module" src="./main.ts"></script>
</body>
</html>
